<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cursor-follower"></div>
    <div id="cursor-main"></div>

    <div id="smooth-wrapper">
        <nav class="nav-bar">
            <div class="nav-container">
                <div class="nav-left">
                    <a href="index.html"><img src="logotaller.png" alt="Nakina Logo" class="side-logo"></a>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="refugio.html" class="nav-link">Refugio</a></li>
                    <li><a href="inscripciones.html" class="nav-link">Inscripciones</a></li>
                </ul>
            </div>
        </nav>

        <main class="artistic-gallery">
            <div class="gallery-instruction">
                <span class="highlight-underline">Explorá mi taller:</span> pasá el cursor sobre cada imagen para conocer detalles técnicos y herramientas.
            </div>
            
            <div class="gallery-item wide" data-title="Área de mecanizado." data-desc="Sector destinado al desbaste principal. Las mesas amplias soportan la manipulación segura de tablones de dimensiones considerables.">
                <img src="espacio.jpeg" alt="Área de mecanizado">
            </div>
            <div class="gallery-item" data-title="Procesamiento de materia prima." data-desc="Configuración del banco de trabajo y maquinaria para el dimensionado inicial de las piezas de madera maciza.">
                <img src="maquinas.jpeg" alt="Sector de maquinaria">
            </div>
            <div class="gallery-item tall" data-title="Ajuste de superficies." data-desc="Acción de remoción de material mediante cepillo manual para lograr una cara perfectamente plana y lista para el encolado.">
                <img src="cepillomadera.jpeg" alt="Cepillado manual de madera">
            </div>
            <div class="gallery-item" data-title="Aclimatación de material." data-desc="Control de temperatura en el entorno de trabajo. Mantener condiciones térmicas estables es crucial para evitar alabeos en la madera maciza.">
                <img src="fuego1.jpeg" alt="Estufa del taller">
            </div>
            <div class="gallery-item wide" data-title="Distribución en planta." data-desc="Organización de las estaciones de trabajo según la secuencia de producción. Un diseño eficiente minimiza el desplazamiento de piezas.">
                <img src="tallerdeotrolado.jpeg" alt="Distribución de estaciones de trabajo">
            </div>
            <div class="gallery-item" data-title="Procesos colaborativos." data-desc="Coordinación en el ensamble de piezas de gran formato. El trabajo sincronizado garantiza la aplicación uniforme de presión y adhesivo.">
                <img src="jjj.jpeg" alt="Trabajo colaborativo">
            </div>
            <div class="gallery-item" data-title="Selección y despiece." data-desc="Análisis del patrón de vetas y contenido de humedad. Identificar la orientación de las fibras es esencial para maximizar la estabilidad.">
                <img src="madera.jpeg" alt="Tablones de madera">
            </div>
            <div class="gallery-item" data-title="Seguridad industrial." data-desc="Implementación de Equipos de Protección Personal (EPP). El uso de protectores auditivos y visuales es obligatorio durante el mecanizado.">
                <img src="audifon.jpeg" alt="Protección auditiva">
            </div>
            <div class="gallery-item tall" data-title="Sujeción y ensamble." data-desc="Estación principal equipada con prensas. Permite la inmovilización segura de los componentes para trabajos de ebanistería precisos.">
                <img src="mesa grande.jpeg" alt="Banco de carpintero">
            </div>
            <div class="gallery-item" data-title="Gestión de herramientas." data-desc="Almacenamiento clasificado de utillaje manual. El acceso rápido y ordenado reduce los tiempos de preparación entre fases.">
                <img src="otro.jpeg" alt="Gestión de herramientas">
            </div>
            <div class="gallery-item" data-title="Afilado y mantenimiento." data-desc="Rectificado de hojas de corte sobre piedras al agua. Restaurar el bisel garantiza un desbaste limpio sin desgarros en la fibra.">
                <img src="otroespacio.jpeg" alt="Piedras de afilar">
            </div>
            <div class="gallery-item" data-title="Trazado y precisión." data-desc="Uso de escuadras y reglas metálicas para asegurar la ortogonalidad de las piezas. La exactitud evita errores acumulativos en el ensamble.">
                <img src="regla.jpeg" alt="Herramientas de medición">
            </div>
        </main>

        <footer class="site-footer">
            <div class="footer-content">
                <div class="footer-form" id="contact-section">
                    <h3>CONTACTO</h3>
                    <form id="footer-unlock-form" class="luxury-form">
                        <input type="text" placeholder="NOMBRE COMPLETO" required>
                        <input type="number" placeholder="EDAD" required>
                        <input type="email" placeholder="GMAIL" required>
                        <textarea placeholder="Mensaje (opcional): ¿Querés preguntarle algo al taller?" rows="3"></textarea>
                        <button type="submit" class="btn-footer">ENVIAR</button>
                    </form>
                    <div id="form-success-msg" style="display: none; margin-top: 2rem; color: var(--sage-green-light); font-weight: 700;">
                        ¡Muchas gracias por contactarte! Pronto te estaremos mandando los detalles.
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <div class="footer-left">
                    <img src="logotaller.png" alt="Nakina" class="footer-logo-small">
                </div>
                <div class="footer-center">
                    <p class="footer-copyright">© 2026 NAKINA TALLER. DISEÑO SENSORIAL</p>
                </div>
                <div class="footer-right">
                    <a href="https://wa.me/5491100000000" target="_blank">
                        <img src="logowsp.png" alt="WhatsApp" class="footer-social-icon">
                    </a>
                    <a href="https://www.instagram.com/viva.nakina/" target="_blank">
                        <img src="logoig.png" alt="Instagram" class="footer-social-icon">
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
